<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더여백26 CS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand:       #678CE4;
  --brand-hover: #4f76d6;
  --brand-dim:   #eef2fc;
  --brand-mid:   #c0d1f5;
  --black:       #0d0d0d;
  --gray-1:      #2a2a2a;
  --gray-2:      #555;
  --gray-3:      #999;
  --gray-4:      #d4d4d4;
  --gray-5:      #f4f5f7;
  --white:       #ffffff;
  --radius-sm:   6px;
  --radius:      12px;
  --radius-lg:   18px;
}

body {
  font-family: 'Pretendard Variable', 'Apple SD Gothic Neo', sans-serif;
  background: var(--gray-5);
  color: var(--black);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ────────────────────────────────────────── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-4);
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-badge {
  width: 32px;
  height: 32px;
  background: var(--brand);
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: var(--white);
  font-size: 0.75rem;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.header-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--black);
  letter-spacing: -0.3px;
}
.header-sub {
  font-size: 0.75rem;
  color: var(--gray-3);
  font-weight: 400;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.status-dot {
  width: 7px; height: 7px;
  background: #22c55e;
  border-radius: 50%;
}
.status-label {
  font-size: 0.75rem;
  color: var(--gray-2);
  font-weight: 500;
}

/* ── Layout ─────────────────────────────────────────── */
.page { max-width: 900px; margin: 0 auto; padding: 36px 24px 80px; }

/* ── Tab nav ────────────────────────────────────────── */
.tab-nav {
  display: inline-flex;
  background: var(--white);
  border: 1px solid var(--gray-4);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 28px;
  gap: 2px;
}
.tab-btn {
  padding: 8px 22px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--gray-3);
  cursor: pointer;
  transition: all 0.18s ease;
  letter-spacing: -0.2px;
}
.tab-btn:hover { color: var(--brand); }
.tab-btn.active {
  background: var(--brand);
  color: var(--white);
  box-shadow: 0 2px 8px rgba(103,140,228,0.35);
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Card ───────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--gray-4);
  border-radius: var(--radius-lg);
  padding: 32px;
}
.card + .card { margin-top: 16px; }

/* ── Section heading ────────────────────────────────── */
.section-heading {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-bottom: 20px;
}

/* ── Form ───────────────────────────────────────────── */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.form-group { display: flex; flex-direction: column; gap: 6px; }

.form-group label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--gray-1);
  letter-spacing: 0.01em;
}
.req { color: var(--brand); margin-left: 2px; }

.form-group input,
.form-group textarea {
  padding: 11px 14px;
  border: 1.5px solid var(--gray-4);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.92rem;
  color: var(--black);
  background: var(--white);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
  -webkit-appearance: none;
}
.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--gray-3); }
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(103,140,228,0.14);
}
.form-group textarea {
  resize: vertical;
  min-height: 100px;
  line-height: 1.6;
}

/* ── Inline error ───────────────────────────────────── */
.error-msg {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: #e03131;
  min-height: 16px;
}
.form-group input.field-error,
.form-group textarea.field-error {
  border-color: #e03131;
  box-shadow: 0 0 0 3px rgba(224,49,49,0.1);
}

/* ── Buttons ────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s ease;
  letter-spacing: -0.1px;
  white-space: nowrap;
}
.btn-primary {
  background: var(--brand);
  color: var(--white);
  padding: 12px 28px;
  font-size: 0.92rem;
  box-shadow: 0 2px 10px rgba(103,140,228,0.3);
}
.btn-primary:hover { background: var(--brand-hover); box-shadow: 0 4px 14px rgba(103,140,228,0.4); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  background: var(--gray-4);
  color: var(--gray-3);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}
.btn-ghost {
  background: transparent;
  color: var(--gray-2);
  border: 1.5px solid var(--gray-4);
  padding: 10px 18px;
  font-size: 0.85rem;
}
.btn-ghost:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-dim); }
.btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 7px 16px; font-size: 0.82rem; }

/* ── Spinner ─────────────────────────────────────────── */
.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  display: none;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Answer section ─────────────────────────────────── */
#answer-section { display: none; }

.answer-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--brand);
  margin-bottom: 14px;
}
.answer-label::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--brand);
  border-radius: 2px;
}

#answer-box {
  background: var(--brand-dim);
  border: 1px solid var(--brand-mid);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  font-size: 0.92rem;
  line-height: 1.8;
  white-space: pre-wrap;
  color: var(--gray-1);
  min-height: 80px;
}
.answer-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

/* ── History ─────────────────────────────────────────── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
  align-items: center;
}
.filter-bar input {
  padding: 9px 13px;
  border: 1.5px solid var(--gray-4);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.85rem;
  color: var(--black);
  background: var(--white);
  outline: none;
  flex: 1;
  min-width: 110px;
  max-width: 170px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.filter-bar input::placeholder { color: var(--gray-3); }
.filter-bar input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(103,140,228,0.14); }
.filter-bar input[type="date"] { max-width: 155px; }
.filter-bar .btn-group { display: flex; gap: 8px; margin-left: auto; }

.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
thead tr {
  border-bottom: 2px solid var(--black);
}
thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--gray-2);
  white-space: nowrap;
  background: var(--white);
}
tbody tr {
  border-bottom: 1px solid var(--gray-5);
  cursor: pointer;
  transition: background 0.12s;
}
tbody tr:hover { background: var(--brand-dim); }
tbody td {
  padding: 12px 14px;
  vertical-align: middle;
  color: var(--gray-1);
}
.td-date { white-space: nowrap; font-size: 0.8rem; color: var(--gray-3); font-variant-numeric: tabular-nums; }
.td-badge {
  display: inline-block;
  background: var(--gray-5);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--gray-2);
}
.td-text {
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.empty-state {
  text-align: center;
  padding: 52px 0;
  color: var(--gray-3);
  font-size: 0.9rem;
}
.empty-state p { margin-top: 8px; font-size: 0.8rem; }

/* ── Modal ───────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(13,13,13,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 0;
  max-width: 620px;
  width: 100%;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--gray-5);
}
.modal-header h3 { font-size: 0.95rem; font-weight: 700; color: var(--black); }
.modal-close {
  width: 30px; height: 30px;
  border-radius: 6px;
  border: none;
  background: var(--gray-5);
  color: var(--gray-2);
  font-size: 1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--gray-4); }
.modal-body { padding: 20px 24px; overflow-y: auto; }
.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 18px;
}
.meta-chip {
  background: var(--gray-5);
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--gray-2);
}
.modal-section-label {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-3);
  margin-bottom: 8px;
}
.modal-section-label + div { margin-bottom: 16px; }
.modal-text {
  background: var(--gray-5);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 0.9rem;
  line-height: 1.75;
  white-space: pre-wrap;
  color: var(--gray-1);
}
.modal-text.answer { background: var(--brand-dim); border: 1px solid var(--brand-mid); }

/* ── Toast ───────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--black);
  color: var(--white);
  padding: 11px 22px;
  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.toast-error { background: #e03131; }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 640px) {
  header { padding: 0 20px; }
  .page { padding: 24px 16px 60px; }
  .card { padding: 20px; }
  .form-row { grid-template-columns: 1fr; }
  .filter-bar .btn-group { margin-left: 0; width: 100%; }
  .filter-bar input { max-width: 100%; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-logo">
    <div class="header-badge">26</div>
    <div>
      <div class="header-title">더여백26 CS</div>
      <div class="header-sub">고객응대 어시스턴트</div>
    </div>
  </div>
  <div class="header-right">
    <span class="status-dot"></span>
    <span class="status-label">서버 연결됨</span>
  </div>
</header>

<!-- ── Page ── -->
<div class="page">

  <!-- Tab nav -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('chat')">답변 생성</button>
    <button class="tab-btn" onclick="switchTab('history')">히스토리</button>
  </nav>

  <!-- ── Tab 1: 답변 생성 ── -->
  <div id="tab-chat" class="tab-panel active">
    <div class="card">
      <div class="section-heading">응대 정보</div>
      <div class="form-row">
        <div class="form-group">
          <label>담당자명<span class="req">*</span></label>
          <input id="staff-name" type="text" placeholder="김민지" autocomplete="off">
          <span class="error-msg" id="err-staff"></span>
        </div>
        <div class="form-group">
          <label>고객 ID</label>
          <input id="customer-id" type="text" placeholder="CU001" autocomplete="off">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label>고객 질문<span class="req">*</span></label>
        <textarea id="question" placeholder="고객이 문의한 내용을 입력하세요.&#10;Enter로 답변을 생성하거나, Shift+Enter로 줄바꿈합니다."></textarea>
        <span class="error-msg" id="err-question"></span>
      </div>
      <button class="btn btn-primary" id="generate-btn" onclick="generateAnswer()">
        <span class="spinner" id="spinner"></span>
        <span id="btn-label">답변 생성</span>
      </button>
    </div>

    <!-- 답변 -->
    <div id="answer-section" class="card">
      <div class="answer-label">생성된 답변</div>
      <div id="answer-box"></div>
      <div class="answer-actions">
        <button class="btn btn-ghost btn-sm" id="copy-btn" onclick="copyAnswer()">복사</button>
        <button class="btn btn-ghost btn-sm" onclick="resetForm()">초기화</button>
      </div>
    </div>
  </div>

  <!-- ── Tab 2: 히스토리 ── -->
  <div id="tab-history" class="tab-panel">
    <div class="card">
      <div class="section-heading">응대 히스토리</div>
      <div class="filter-bar">
        <input id="f-staff" type="text" placeholder="담당자명">
        <input id="f-customer" type="text" placeholder="고객 ID">
        <input id="f-from" type="date">
        <input id="f-to" type="date">
        <div class="btn-group">
          <button class="btn btn-primary btn-sm" onclick="loadHistory()">검색</button>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()">CSV 저장</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>일시</th>
              <th>담당자</th>
              <th>고객 ID</th>
              <th>질문</th>
              <th>답변</th>
            </tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="5"><div class="empty-state">검색 버튼을 눌러 조회하세요.</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>응대 상세</h3>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-section-label">질문</div>
      <div class="modal-text" id="modal-question"></div>
      <div style="height:12px"></div>
      <div class="modal-section-label">답변</div>
      <div class="modal-text answer" id="modal-answer"></div>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CONFIG = { apiBase: window.location.origin };

// ── Tab ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['chat', 'history'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') loadHistory();
}

// ── 중복 클릭 방지 ────────────────────────────────────────────────────────────
let isLoading = false;

// ── 필드 에러 ─────────────────────────────────────────────────────────────────
function setFieldError(fieldId, errId, msg) {
  const field = document.getElementById(fieldId);
  const errEl = document.getElementById(errId);
  if (msg) { field.classList.add('field-error'); errEl.textContent = msg; }
  else      { field.classList.remove('field-error'); errEl.textContent = ''; }
}

function validateForm() {
  const staffName = document.getElementById('staff-name').value.trim();
  const question  = document.getElementById('question').value.trim();
  let valid = true;
  if (!staffName) { setFieldError('staff-name', 'err-staff', '담당자명은 필수 입력 항목입니다.'); valid = false; }
  if (!question)  { setFieldError('question',   'err-question', '고객 질문은 필수 입력 항목입니다.'); valid = false; }
  return valid;
}

function parseApiError(res, body) {
  if (!res.ok) {
    if (res.status >= 500) return '서버 내부 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    if (res.status === 422) return '입력값을 확인해주세요.';
    return body?.detail || `오류가 발생했습니다. (${res.status})`;
  }
  return null;
}

// ── 답변 생성 ─────────────────────────────────────────────────────────────────
async function generateAnswer() {
  if (isLoading) return;
  if (!validateForm()) return;

  isLoading = true;
  setLoading(true);

  const staffName  = document.getElementById('staff-name').value.trim();
  const customerId = document.getElementById('customer-id').value.trim();
  const question   = document.getElementById('question').value.trim();

  try {
    const res  = await fetch(`${CONFIG.apiBase}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customer_id: customerId, question, staff_name: staffName }),
    });
    const body = await res.json().catch(() => null);
    const err  = parseApiError(res, body);
    if (err) throw new Error(err);

    document.getElementById('answer-box').textContent = body.answer;
    document.getElementById('answer-section').style.display = 'block';
    document.getElementById('answer-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch (e) {
    const msg = e.message.includes('Failed to fetch')
      ? '서버에 연결할 수 없습니다.'
      : e.message;
    showToast(msg, 'error');
  } finally {
    isLoading = false;
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('generate-btn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-label').textContent = on ? '생성 중...' : '답변 생성';
}

// ── 복사 ──────────────────────────────────────────────────────────────────────
async function copyAnswer() {
  const text = document.getElementById('answer-box').textContent.trim();
  if (!text) return;
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    setCopySuccess();
  } catch {
    showToast('복사에 실패했습니다.', 'error');
  }
}

function setCopySuccess() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✓ 복사됨';
  btn.disabled = true;
  showToast('클립보드에 복사되었습니다.');
  setTimeout(() => { btn.textContent = '복사'; btn.disabled = false; }, 2000);
}

function resetForm() {
  document.getElementById('question').value = '';
  document.getElementById('answer-box').textContent = '';
  document.getElementById('answer-section').style.display = 'none';
  document.getElementById('question').focus();
}

// ── 히스토리 ─────────────────────────────────────────────────────────────────
async function loadHistory() {
  const params = new URLSearchParams({
    staff_name:  document.getElementById('f-staff').value.trim(),
    customer_id: document.getElementById('f-customer').value.trim(),
    from_date:   document.getElementById('f-from').value,
    to_date:     document.getElementById('f-to').value,
  });

  const tbody = document.getElementById('history-body');
  tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">불러오는 중...</div></td></tr>';

  try {
    const res   = await fetch(`${CONFIG.apiBase}/api/chat/history/all?${params}`);
    if (!res.ok) throw new Error(await res.text());
    const items = await res.json();

    if (!items.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">조회된 내역이 없습니다.<p>검색 조건을 변경해보세요.</p></div></td></tr>';
      return;
    }

    tbody.innerHTML = items.map(item => `
      <tr onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
        <td class="td-date">${formatDate(item.created_at)}</td>
        <td><span class="td-badge">${esc(item.staff_name) || '—'}</span></td>
        <td><span class="td-badge">${esc(item.customer_id) || '—'}</span></td>
        <td class="td-text">${esc(item.question)}</td>
        <td class="td-text">${esc(item.answer)}</td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">오류: ${e.message}</div></td></tr>`;
  }
}

function exportCSV() {
  const params = new URLSearchParams({
    staff_name:  document.getElementById('f-staff').value.trim(),
    customer_id: document.getElementById('f-customer').value.trim(),
    from_date:   document.getElementById('f-from').value,
    to_date:     document.getElementById('f-to').value,
  });
  window.location.href = `${CONFIG.apiBase}/api/chat/history/export?${params}`;
}

// ── 모달 ──────────────────────────────────────────────────────────────────────
function openModal(item) {
  const meta = document.getElementById('modal-meta');
  meta.innerHTML = [
    `<span class="meta-chip">${formatDate(item.created_at)}</span>`,
    `<span class="meta-chip">담당자 ${esc(item.staff_name) || '—'}</span>`,
    `<span class="meta-chip">고객 ID ${esc(item.customer_id) || '—'}</span>`,
  ].join('');
  document.getElementById('modal-question').textContent = item.question;
  document.getElementById('modal-answer').textContent   = item.answer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function formatDate(iso) {
  const d = new Date(iso), pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type === 'error' ? ' toast-error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, type === 'error' ? 4000 : 2500);
}

// ── 이벤트 ────────────────────────────────────────────────────────────────────
document.getElementById('staff-name').addEventListener('input', () => setFieldError('staff-name', 'err-staff', ''));
document.getElementById('question').addEventListener('input',   () => setFieldError('question', 'err-question', ''));
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generateAnswer(); }
});
</script>
